<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Guide</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
  color:#fff;
  font-weight:200;
  overflow-x:hidden;
}

/* global text shadow */
*{
  text-shadow:0 2px 6px rgba(0,0,0,1);
}

#wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px 80px;
  box-sizing:border-box;
  position:relative;
}

video{
  width:min(1000px,85vw);
  max-height:70vh;
  border-radius:14px;
  background:#000;
  box-shadow:0 0 60px rgba(0,0,0,0.9);
}

#subs{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:min(1000px,85vw);
  text-align:center;
  color:#fff;
  font-size:22px;
  pointer-events:none;
  padding:0 20px;
  line-height:1.3;
  font-weight:200;
}

#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.75);
  color:#fff;
  padding:16px 26px;
  border-radius:0;
  border:1px solid rgba(255,255,255,0.25);
  cursor:pointer;
  font-size:20px;
  letter-spacing:.5px;
  user-select:none;
  font-weight:200;
}

#transcriptionSection{
  margin-top:50px;
  width:min(1000px,85vw);
  display:none;
}

#transcriptionSection h2{
  font-weight:200;
  margin-bottom:12px;
  color:#fff;
  letter-spacing:.5px;
}

#download{
  display:inline-block;
  padding:10px 18px;
  border-radius:0;
  background:#111;
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  cursor:pointer;
  transition:.2s ease;
  font-weight:200;
}

#download:hover{
  background:#1b1b1b;
  transform:translateY(-2px);
}

#grain{
  pointer-events:none;
  position:fixed;
  inset:0;
  opacity:.45;
  z-index:10;
  background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABAAQMAAABmvDolAAAABlBMVEUAAAD///+l2Z/dAAAAMElEQVR4AWMYBaNgFIyCUTAKRsEoGAWjYBSMglEwCkbBKBgFo2AUjIJRMAoGAAAZ6gX2gMUR3QAAAABJRU5ErkJggg==");
  mix-blend-mode:screen;
  animation:grain .08s steps(3) infinite;
}

@keyframes grain{
  0%{transform:translate(0,0)}
  25%{transform:translate(-5%,-5%)}
  50%{transform:translate(5%,5%)}
  75%{transform:translate(-5%,5%)}
  100%{transform:translate(5%,-5%)}
}

@media(max-width:700px){
  #subs{font-size:16px;bottom:140px}
  #start{font-size:18px;padding:14px 20px}
}
</style>
</head>

<body>

<div id="wrap">

  <video
    id="vid"
    src="https://files.catbox.moe/6qvtat.mp4"
    preload="auto"
    playsinline
    tabindex="-1">
  </video>

  <div id="subs"></div>

  <div id="start">watch</div>

  <div id="transcriptionSection">
    <h2>transcript/subtitles (for translation)</h2>
    <div id="download">Download transcript.txt</div>
  </div>

</div>

<div id="grain"></div>

<script>
const v = document.getElementById("vid");
const subs = document.getElementById("subs");
const dl = document.getElementById("download");
const start = document.getElementById("start");
const transcriptionSection = document.getElementById("transcriptionSection");

let cues = [];
let unlocked = localStorage.getItem("bunnyzDone") === "1";

v.controls = unlocked;
if(unlocked){
  transcriptionSection.style.display="block";
}

start.addEventListener("click", async ()=>{
  try{
    await v.play();
    start.style.display="none";
  }catch{}
});

if(!unlocked){
  v.addEventListener("seeking", ()=>{
    const last = typeof v._lastTime==="number"?v._lastTime:0;
    if(v.currentTime > last + 0.25){
      v.currentTime = last || 0;
    }
  });
}

v.addEventListener("timeupdate", ()=>{
  v._lastTime = v.currentTime;
  const t = v.currentTime;
  for(const c of cues){
    if(t>=c.s && t<=c.e){
      subs.textContent=c.t;
      return;
    }
  }
  subs.textContent="";
});

v.addEventListener("ended", ()=>{
  localStorage.setItem("bunnyzDone","1");
  v.controls=true;
  transcriptionSection.style.display="block";
});

dl.addEventListener("click", ()=>{
  const a=document.createElement("a");
  a.href="assets/transcript.txt";
  a.download="transcript.txt";
  a.click();
});

async function loadTS(path){
  try{
    const res=await fetch(path,{cache:"no-store"});
    const txt=await res.text();
    const blocks=txt.replace(/\r/g,"").trim().split(/\n{2,}/);
    cues=[];
    for(const block of blocks){
      const lines=block.split("\n");
      if(lines.length>=3){
        const m=lines[1].match(/^(.+?)\s*-->\s*(.+)$/);
        if(!m)continue;
        cues.push({
          s:toSeconds(m[1]),
          e:toSeconds(m[2]),
          t:lines.slice(2).join(" ").trim()
        });
      }
    }
  }catch{}
}

function toSeconds(t){
  const p=t.replace(",",".").split(":").map(Number);
  return p.length===3
    ? p[0]*3600+p[1]*60+p[2]
    : p[0]*60+p[1];
}

loadTS("assets/transcript.txt");

v.addEventListener("click",async()=>{
  if(v.paused){
    try{
      await v.play();
      start.style.display="none";
    }catch{}
  }else{
    v.pause();
  }
});

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    v.paused?v.play():v.pause();
  }
});
</script>

</body>
</html>
