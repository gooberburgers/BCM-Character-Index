<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Guide</title>
<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}
#wrap{
position:relative;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}
video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}
#grain{
position:fixed;
inset:0;
pointer-events:none;
background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwAgMAAADYYG7QAAAADFBMVEUAAAD///8AAAB/f3+fn5+oY2pNAAAABHRSTlMA/wD/AP83WBt9AAAAPUlEQVR4AWMYBaNgFIyCUTAKRsEoGAWjYBSMglEwCkbBKBgFo2AUjIJRMApGwSgYBaMAALw+DN2Ky9csAAAAAElFTkSuQmCC");
opacity:.28;
mix-blend-mode:screen;
animation:grain .15s steps(2) infinite;
}
@keyframes grain{
0%{transform:translate(0,0)}
25%{transform:translate(-4%,-4%)}
50%{transform:translate(4%,4%)}
75%{transform:translate(-4%,4%)}
100%{transform:translate(4%,-4%)}
}
#subs{
position:absolute;
bottom:6%;
width:100%;
text-align:center;
color:#ffd800;
font-size:22px;
text-shadow:0 0 10px rgba(255,216,0,.8);
pointer-events:none;
padding:0 30px;
}
#download{
position:absolute;
bottom:2%;
width:100%;
text-align:center;
color:#ffd800;
font-size:20px;
text-shadow:0 0 10px rgba(255,216,0,.8);
cursor:pointer;
display:none;
}
#start{
position:absolute;
color:#ffd800;
font-size:22px;
text-shadow:0 0 12px rgba(255,216,0,.8);
cursor:pointer;
}
</style>
</head>
<body>
<div id="wrap">
<video id="vid" src="assets/prototype.mp4" preload="auto"></video>
<div id="subs"></div>
<div id="download">Download Transcription?</div>
<div id="start">Click to begin</div>
</div>
<div id="grain"></div>
<script>
const v=document.getElementById("vid");
const subs=document.getElementById("subs");
const dl=document.getElementById("download");
const start=document.getElementById("start");
let cues=[];
let unlocked=localStorage.getItem("bunnyzDone")==="1";

v.controls=unlocked;

start.onclick=()=>{
start.style.display="none";
v.play();
};

if(!unlocked){
v.addEventListener("seeking",()=>{
if(v.currentTime>v._lastTime+0.25)v.currentTime=v._lastTime||0;
});
}

v.addEventListener("timeupdate",()=>{
v._lastTime=v.currentTime;
const t=v.currentTime;
for(const c of cues){
if(t>=c.s&&t<=c.e){
subs.textContent=c.t;
return;
}
}
subs.textContent="";
});

v.addEventListener("ended",()=>{
localStorage.setItem("bunnyzDone","1");
v.controls=true;
dl.style.display="block";
});

dl.onclick=()=>{
const a=document.createElement("a");
a.href="assets/ENG.srt";
a.download="ENG.srt";
a.click();
};

fetch("assets/ENG.srt").then(r=>r.text()).then(t=>{
t.split(/\n\n+/).forEach(b=>{
const l=b.split("\n");
if(l.length>=3){
const [s,e]=l[1].split(" --> ");
cues.push({s:pt(s),e:pt(e),t:l.slice(2).join(" ")});
}
});
});

function pt(x){
const p=x.replace(",",".").split(":");
return +p[0]*3600+ +p[1]*60+ +p[2];
}
</script>
</body>
</html>
