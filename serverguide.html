<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Guide</title>
<style>
  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
  }

  #wrap{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
  }

  video{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
  }

  #grain{
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwAgMAAADYYG7QAAAADFBMVEUAAAD///8AAAB/f3+fn5+oY2pNAAAABHRSTlMA/wD/AP83WBt9AAAAPUlEQVR4AWMYBaNgFIyCUTAKRsEoGAWjYBSMglEwCkbBKBgFo2AUjIJRMApGwSgYBaMAALw+DN2Ky9csAAAAAElFTkSuQmCC");
    opacity:.28;
    mix-blend-mode:screen;
    animation:grain .15s steps(2) infinite;
    z-index:4;
  }

  @keyframes grain{
    0%{transform:translate(0,0)}
    25%{transform:translate(-4%,-4%)}
    50%{transform:translate(4%,4%)}
    75%{transform:translate(-4%,4%)}
    100%{transform:translate(4%,-4%)}
  }

  #subs{
    position:absolute;
    bottom:6%;
    left:0;
    right:0;
    width:100%;
    text-align:center;
    color:#ffd800;
    font-size:22px;
    text-shadow:0 0 10px rgba(255,216,0,.8);
    pointer-events:none;
    padding:0 30px;
    z-index:3;
    line-height:1.2;
    max-width:min(1200px,95%);
    margin:0 auto;
    word-wrap:break-word;
  }

  #download{
    position:absolute;
    bottom:2%;
    left:0;
    right:0;
    width:100%;
    text-align:center;
    color:#ffd800;
    font-size:20px;
    text-shadow:0 0 10px rgba(255,216,0,.8);
    cursor:pointer;
    display:none;
    z-index:3;
  }

  #start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#ffd800;
    font-size:22px;
    text-shadow:0 0 12px rgba(255,216,0,.8);
    cursor:pointer;
    z-index:5;
    background:rgba(0,0,0,0.6);
    padding:14px 24px;
    border-radius:10px;
    border:1px solid rgba(255,216,0,0.12);
    pointer-events:auto;
    user-select:none;
  }

  #message {
    position: absolute;
    top: 2%;
    left: 50%;
    transform: translateX(-50%);
    color: #ff8a8a;
    font-size: 14px;
    text-shadow: 0 0 6px rgba(255,0,0,0.6);
    z-index: 6;
    padding: 6px 10px;
    border-radius: 6px;
    background: rgba(0,0,0,0.5);
    display:none;
  }

  @media (max-width:600px){
    #subs{font-size:16px; bottom:8%;}
    #start{font-size:18px; padding:12px 18px;}
  }
</style>
</head>
<body>
  <div id="wrap">
    <video
      id="vid"
      src="https://files.catbox.moe/6qvtat.mp4"
      preload="auto"
      playsinline
      tabindex="-1">
    </video>

    <div id="subs" aria-live="polite"></div>
    <div id="download">Download Transcription?</div>
    <div id="start" role="button" aria-pressed="false">Click to begin</div>
    <div id="message" role="status"></div>
  </div>

  <div id="grain"></div>

<script>
  const v = document.getElementById("vid");
  const subs = document.getElementById("subs");
  const dl = document.getElementById("download");
  const start = document.getElementById("start");
  const msg = document.getElementById("message");

  let cues = [];
  let unlocked = localStorage.getItem("bunnyzDone") === "1";

  v.controls = !!unlocked;

  function showMessage(text, timeout = 4500) {
    msg.textContent = text;
    msg.style.display = "block";
    if (timeout > 0) {
      clearTimeout(msg._t);
      msg._t = setTimeout(() => msg.style.display = "none", timeout);
    }
  }

  start.addEventListener("click", async () => {
    try {
      await v.play();
      start.style.display = "none";
    } catch (err) {
      console.error("Play failed:", err);
      showMessage("Playback blocked — click again or check browser settings.");
    }
  });

  if (!unlocked) {
    v.addEventListener("seeking", () => {
      const last = typeof v._lastTime === "number" ? v._lastTime : 0;
      if (v.currentTime > last + 0.25) {
        v.currentTime = last || 0;
      }
    });
  }

  v.addEventListener("timeupdate", () => {
    v._lastTime = v.currentTime;
    const t = v.currentTime;
    for (const c of cues) {
      if (t >= c.s && t <= c.e) {
        subs.textContent = c.t;
        return;
      }
    }
    subs.textContent = "";
  });

  v.addEventListener("ended", () => {
    localStorage.setItem("bunnyzDone", "1");
    v.controls = true;
    dl.style.display = "block";
    showMessage("Playback finished. Controls enabled.", 3000);
  });

  dl.addEventListener("click", () => {
    const a = document.createElement("a");
    a.href = "assets/ENG.srt";
    a.download = "ENG.srt";
    a.click();
  });

  v.addEventListener("error", (ev) => {
    console.error("Video error:", ev, v.error);
    showMessage("Error loading video.", 8000);
    v.controls = true;
  });

  async function loadSRT(path) {
    try {
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(res.status);
      const txt = await res.text();

      const blocks = txt.replace(/\r/g,"").trim().split(/\n{2,}/);
      cues = [];

      for (const block of blocks) {
        const lines = block.split("\n");
        if (lines.length >= 3) {
          const m = lines[1].match(/^(.+?)\s*-->\s*(.+)$/);
          if (!m) continue;
          cues.push({
            s: toSeconds(m[1]),
            e: toSeconds(m[2]),
            t: lines.slice(2).join(" ").trim()
          });
        }
      }
    } catch {
      showMessage("Subtitles unavailable.", 4000);
    }
  }

  function toSeconds(t) {
    const p = t.replace(",", ".").split(":").map(Number);
    return p.length === 3
      ? p[0]*3600 + p[1]*60 + p[2]
      : p[0]*60 + p[1];
  }

  loadSRT("assets/ENG.srt");

  v.addEventListener("click", async () => {
    if (v.paused) {
      try {
        await v.play();
        start.style.display = "none";
      } catch {}
    } else {
      v.pause();
    }
  });

  document.addEventListener("keydown", e => {
    if (e.code === "Space") {
      e.preventDefault();
      v.paused ? v.play() : v.pause();
    }
  });
</script>
</body>
</html>
