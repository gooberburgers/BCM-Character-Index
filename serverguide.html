<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prototype Playback</title>
<style>
html,body{
margin:0;
padding:0;
background:#000;
overflow:hidden;
height:100%;
font-family:Arial,Helvetica,sans-serif;
}
#container{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}
video{
max-width:100%;
max-height:100%;
background:#000;
}
#grain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:.25;
background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAAAQCAYAAABAfUpMAAAAHUlEQVR42u3BAQEAAACCIP+vbkhAAQAAAAAAAAAAwJcEwAAB1vZ1AAAAAElFTkSuQmCC");
background-repeat:repeat;
animation:noise .2s infinite;
mix-blend-mode:screen;
}
@keyframes noise{
0%{transform:translate(0,0)}
10%{transform:translate(-5%,-5%)}
20%{transform:translate(-10%,5%)}
30%{transform:translate(5%,-10%)}
40%{transform:translate(-5%,15%)}
50%{transform:translate(-10%,5%)}
60%{transform:translate(15%,0)}
70%{transform:translate(0,10%)}
80%{transform:translate(-15%,0)}
90%{transform:translate(10%,5%)}
100%{transform:translate(5%,0)}
}
#subtitle{
position:absolute;
bottom:5%;
width:100%;
text-align:center;
color:#ffd800;
font-size:22px;
text-shadow:0 0 8px rgba(255,216,0,.7);
pointer-events:none;
padding:0 20px;
}
#download{
position:absolute;
bottom:2%;
width:100%;
text-align:center;
color:#ffd800;
font-size:20px;
cursor:pointer;
display:none;
text-shadow:0 0 8px rgba(255,216,0,.7);
}
</style>
</head>
<body>
<div id="container">
<video id="video" src="assets/prototype.mp4"></video>
<div id="subtitle"></div>
<div id="download">Download Transcription?</div>
</div>
<div id="grain"></div>
<script>
const video=document.getElementById("video");
const subtitle=document.getElementById("subtitle");
const download=document.getElementById("download");
let cues=[];
let allowed=localStorage.getItem("watchedPrototype")==="true";
if(!allowed){
video.controls=false;
video.addEventListener("seeking",e=>{
if(video.currentTime<video.duration-0.3)return;
video.currentTime=0;
});
}else{
video.controls=true;
}
video.addEventListener("ended",()=>{
localStorage.setItem("watchedPrototype","true");
video.controls=true;
download.style.display="block";
});
download.addEventListener("click",()=>{
const a=document.createElement("a");
a.href="assets/ENG.srt";
a.download="ENG.srt";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
});
fetch("assets/ENG.srt").then(r=>r.text()).then(data=>{
const blocks=data.split(/\n\n+/);
blocks.forEach(b=>{
const lines=b.split("\n");
if(lines.length>=3){
const time=lines[1].split(" --> ");
const start=parseTime(time[0]);
const end=parseTime(time[1]);
const text=lines.slice(2).join(" ");
cues.push({start,end,text});
}
});
});
function parseTime(t){
const parts=t.replace(",",".").split(":");
return parseFloat(parts[0])*3600+parseFloat(parts[1])*60+parseFloat(parts[2]);
}
video.addEventListener("timeupdate",()=>{
const current=video.currentTime;
for(let i=0;i<cues.length;i++){
if(current>=cues[i].start&&current<=cues[i].end){
subtitle.textContent=cues[i].text;
return;
}
}
subtitle.textContent="";
});
video.play();
</script>
</body>
</html>
